[build]
  command = "npm run build"
  functions = "netlify/functions"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22.12.0"

[dev]
  command = "npm run dev"
  port = 4321

# NOTE: Full-URL [[redirects]] (with https:// in the "from" field) are NOT
# supported in netlify.toml — they only work in the public/_redirects file.
# Cross-domain subdomain routing is handled by Astro middleware + _redirects.

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/uploads/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-XSS-Protection = "1; mode=block"

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    Content-Security-Policy = "frame-ancestors 'self' https://app.netlify.com"
    Cache-Control = "no-cache, no-store, must-revalidate"
