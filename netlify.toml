[build]
  command = "npm run build"
  functions = "netlify/functions"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22.12.0"

# Netlify Identity — required for Decap CMS
[dev]
  command = "npm run dev"
  port = 4321

# Assets redirects - MUST come before page redirects
[[redirects]]
  from = "https://*.adagi0.com/_astro/*"
  to = "https://adagi0.com/_astro/:splat"
  status = 200
  force = true

# Subdomain redirects - proxy mode (maintains subdomain URL)
[[redirects]]
  from = "https://demo.adagi0.com/*"
  to = "https://adagi0.com/Demos/:splat"
  status = 200
  force = true

[[redirects]]
  from = "https://demo.adagi0.com"
  to = "https://adagi0.com/Demos/"
  status = 200
  force = true

[[redirects]]
  from = "https://demos.adagi0.com/*"
  to = "https://adagi0.com/Demos/:splat"
  status = 200
  force = true

[[redirects]]
  from = "https://demos.adagi0.com"
  to = "https://adagi0.com/Demos/"
  status = 200
  force = true

# Edge functions completely disabled

# Headers for security and performance
[[headers]]
  for = "/Demos/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-XSS-Protection = "1; mode=block"

# CMS admin — allow iframe from Netlify Identity
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    Content-Security-Policy = "frame-ancestors 'self' https://app.netlify.com"
    Cache-Control = "no-cache, no-store, must-revalidate"

# Uploaded media files — long cache
[[headers]]
  for = "/uploads/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
